name: CI/CD Pipeline - Kaba-Delivery

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery

jobs:
# ============================================
# STAGE 1 : Lint & Test
# ============================================
  lint-and-test:
    name: "Stage 1 - Lint & Test"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kaba_delivery_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, zip
          coverage: xdebug

      - name: Copy .env
        run: cp .env.example .env.testing

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kaba_delivery_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --env=testing --force

      - name: Run PHPUnit tests with coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kaba_delivery_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --coverage-clover=coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

# ============================================
# STAGE 2 : Code Quality - SonarQube
# ============================================
  code-quality:
    name: "Stage 2 - Code Quality SonarQube"
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        continue-on-error: true
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# ============================================
# STAGE 3 : Build & Push Docker Hub
# ============================================
  build-and-push:
    name: "Stage 3 - Build & Push Docker Hub"
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
                       -t ${{ env.DOCKER_IMAGE }}:latest .

      - name: Scan image avec Trivy (Partie IV)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Push image vers Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

# ============================================
# STAGE 4 : Déploiement Continu O2Switch
# ============================================
  deploy:
    name: "Stage 4 - Déploiement O2Switch"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH sur O2Switch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          script: |
            cd ~/kaba-delivery
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery:latest
            docker stop kaba-delivery || true
            docker rm kaba-delivery || true
            docker run -d \
              --name kaba-delivery \
              --restart unless-stopped \
              -p 8000:9000 \
              --env-file .env \
              ${{ secrets.DOCKERHUB_USERNAME }}/kaba-delivery:latest
            echo "Déploiement terminé avec succès !"